<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Parcial 2</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div id="contenedor">

    <header id="cabezal">
        <img src="img/imagen1.jpg" alt="Imagen 1">
        <img src="img/imagen2.jpg" alt="Imagen 2">
        <img src="img/imagen3.jpg" alt="Imagen 3">
    </header>

    <nav id="barra">
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Proyectos</a>
        <a href="#">Contactos</a>
    </nav>

    <main id="principal">

        <aside id="sidebar-left"></aside>

        <section id="cuerpo">
            <div class="login">
                <h2>👤 LOGIN</h2>

                <form>
                    <table>
                        <tr>
                            <td><label>Email</label></td>
                        </tr>
                        <tr>
                            <td><input type="email" placeholder="email address" required></td>
                        </tr>

                        <tr>
                            <td><label>Password</label></td>
                        </tr>
                        <tr>
                            <td><input type="password" placeholder="password" required></td>
                        </tr>

                        <tr>
                            <td><button type="submit">LOGIN</button></td>
                        </tr>
                    </table>
                </form>
            </div>
        </section>

        <aside id="sidebar-right"></aside>

    </main>

    <footer id="pie">
        Emerson Josué Gómez Gómez
    </footer>

</div>
