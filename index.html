<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Parcial 2</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <div id="contenedor">

        <!-- CABEZAL -->

        <header id="cabezal">

            <img src="img/facebook.png" alt="Imagen 1">
            <img src="img/youtube.png" alt="Imagen 2">
            <img src="img/google.png" alt="Imagen 3">

        </header>

        <!-- MENU -->

        <nav id="barra">

            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Proyectos</a>
            <a href="#">Contactos</a>

        </nav>

        <!-- CONTENIDO -->

        <main id="principal">

            <aside id="sidebar-left"></aside>

            <section id="cuerpo">

                <!-- LOGIN -->

                <div class="login neumorphism">

                    <!-- ICONO -->

                    <div class="icono">

                        <img src="img/people.png" alt="People">

                    </div>

                    <!-- TITULO -->

                    <h2>LOGIN</h2>

                    <!-- FORMULARIO -->

                    <form>

                        <table>

                            <!-- EMAIL -->

                            <tr>

                                <td>

                                    <label>EMAIL</label>

                                </td>

                            </tr>

                            <tr>

                                <td>

                                    <input
                                        type="email"
                                        class="input-style"
                                        placeholder="email address"
                                        required>

                                </td>

                            </tr>

                            <!-- PASSWORD -->

                            <tr>

                                <td>

                                    <label>PASSWORD</label>

                                </td>

                            </tr>

                            <tr>

                                <td>

                                    <div class="pass-box">

                                        <input
                                            type="password"
                                            class="input-style"
                                            id="password"
                                            placeholder="password"
                                            required>

                                        <span id="togglePass">👁️</span>

                                    </div>

                                </td>

                            </tr>

                            <!-- BOTON -->

                            <tr>

                                <td>

                                    <button
                                        type="submit"
                                        class="btn-login">

                                        LOGIN

                                    </button>

                                </td>

                            </tr>

                        </table>

                    </form>

                </div>

            </section>

            <aside id="sidebar-right"></aside>

        </main>

        <!-- PIE -->

        <footer id="pie">

            Emerson Josué Gómez Gómez

        </footer>

    </div>

    <!-- SCRIPT -->

    <script>

        const toggle =
            document.getElementById("togglePass");

        const password =
            document.getElementById("password");

        toggle.addEventListener("click", function () {

            if (password.type === "password") {

                password.type = "text";
                toggle.textContent = "🙈";

            }

            else {

                password.type = "password";
                toggle.textContent = "👁️";

            }

        });

    </script>

</body>

</html>
